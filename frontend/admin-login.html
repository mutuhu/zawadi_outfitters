<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#1e1e1e;
padding:50px;
width:380px;
border-radius:22px;
box-shadow:0 0 25px rgba(0,0,0,.45);
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#FFD54F;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>
<body>

<div class="login-box">

<h1>Admin Login</h1>

<input
id="username"
placeholder="Username"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>


<script>

function login(){

let user=
document.getElementById("username").value;

let pass=
document.getElementById("password").value;


/* demo admin credentials */
if(
user==="admin" &&
pass==="1234"
){

window.location="admin.html";

}
else{

alert("Invalid credentials");

}

}

</script>

</body>
</html>
