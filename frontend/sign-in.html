<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1f1f1f;
padding:50px;
width:400px;
border-radius:22px;
box-shadow:0 0 25px rgba(0,0,0,.45);
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#FFD54F;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.95;
}

p{
text-align:center;
margin-top:20px;
}

a{
color:#FFD54F;
text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h1>Create Account</h1>

<input
id="name"
placeholder="Full Name"
>

<input
id="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="signup()">
Sign Up
</button>

<p>
Already have an account?
<a href="customer-login.html">
Login
</a>
</p>

</div>


<script>

async function signup(){

let user = {

name:
document.getElementById("name").value,

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

};


let response = await fetch(
"http://localhost:8080/customers/signup",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(user)
}
);


if(response.ok){

alert("Account created successfully");

window.location="customer-login.html";

}
else{
alert("Signup failed");
}

}

</script>

</body>
</html>
