<!DOCTYPE html>
<html>
<head>
<title>Customer Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1f1f1f;
padding:50px;
width:400px;
border-radius:22px;
box-shadow:0 0 25px rgba(0,0,0,.45);
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#FFD54F;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

p{
text-align:center;
margin-top:20px;
}

a{
color:#FFD54F;
text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h1>Customer Login</h1>

<input
id="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

<p>
No account?
<a href="sign-in.html">
Create one
</a>
</p>

</div>


<script>

async function login(){

let credentials = {

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

};


let response = await fetch(
"http://localhost:8080/customers/login",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(credentials)
}
);

let user = await response.json();


if(user){

localStorage.setItem(
"customer",
JSON.stringify(user)
);

alert("Login successful");

window.location="products.html";

}
else{

alert("Invalid login");

}

}

</script>

</body>
</html>
